<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Proxy Checker FUTURE</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Segoe UI', sans-serif;
}
.card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,255,255,0.1);
}
.ok { color: #28a745; font-weight: bold; transition: transform 0.3s; }
.dead { color: #dc3545; font-weight: bold; transition: transform 0.3s; }
table { font-size: 14px; }
table tr:hover { background: rgba(40, 255, 255, 0.1); transition: 0.3s; }
.progress {
    height: 30px;
    border-radius: 15px;
    overflow: hidden;
    background: #21262d;
}
.progress-bar {
    background: linear-gradient(270deg, #00f0ff, #ff00f0);
    background-size: 400% 400%;
    animation: gradient 3s ease infinite;
    color: #fff;
    font-weight: bold;
    text-align: center;
}
@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.counter {
    font-size: 1.2rem;
    font-weight: bold;
}
.pulse {
    animation: pulse 0.5s ease;
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
}
.toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
}
.pagination {
    justify-content: center;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="container mt-4">

<h2 class="mb-4 text-center">🚀 Proxy Checker FUTURE</h2>

<!-- Upload & Buttons -->
<div class="card p-3 mb-3">
    <div class="row g-2">
        <div class="col-md-4">
            <input type="file" id="file" class="form-control">
        </div>
        <div class="col-md-2">
            <button class="btn btn-success w-100" onclick="upload()">Start Scan</button>
        </div>
        <div class="col-md-2">
            <button class="btn btn-warning w-100" id="pauseBtn" onclick="togglePauseServer()">Pause</button>
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100" onclick="download()">Download OK</button>
        </div>
    </div>
</div>

<!-- Status & Progress -->
<div class="card p-3 mb-3">
    <center><h5>Status: <span id="status" style="color: #FFD700;"></span></h5></center>
    <div class="progress mt-3">
        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width:0%">0%</div>
    </div>
    <div class="mt-2 d-flex justify-content-between">
        <span style="color: #00ff22;">✅ OK: <span id="okCount" class="counter">0</span></span>
        <span style="color: #ff0000;">❌ Dead: <span id="deadCount" class="counter">0</span></span>
    </div>
</div>

<!-- Results Table -->
<div class="card p-3">
    <table class="table table-dark table-hover table-striped align-middle">
        <thead>
            <tr>
                <th>#</th>
                <th>Proxy</th>
                <th>Status</th>
                <th>Info</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>
    <!-- Pagination -->
    <nav>
        <ul class="pagination" id="pagination"></ul>
    </nav>
</div>

</div>

<!-- Toast Notification -->
<div class="toast-container">
    <div class="toast align-items-center text-bg-info border-0" role="alert" id="finishToast" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">
                ✅ Scan Finished! Tous les proxies ont été vérifiés.
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script>
let total = 0;
let toastShown = false;
let pausedServer = false;
let okProxies = [];
let currentPage = 1;
const itemsPerPage = 50; // ✅ 50 lignes max

async function upload(){
    let file = document.getElementById("file").files[0];
    if(!file){ alert("Select a file first!"); return; }

    let form = new FormData();
    form.append("file", file);

    let text = await file.text();
    total = text.split("\n").filter(x => x.trim() !== "").length;

    await fetch("/upload", { method:"POST", body:form });
    loadResults();
}

async function togglePauseServer(){
    let res = await fetch("/toggle_pause", {method:"POST"});
    let data = await res.json();
    pausedServer = data.paused;
    document.getElementById("pauseBtn").innerText = pausedServer ? "Resume" : "Pause";
}

// ✅ TABLE + PAGINATION
function renderTable(page){
    let start = (page-1)*itemsPerPage;
    let end = start + itemsPerPage;
    let html = "";

    for(let i=start;i<end && i<okProxies.length;i++){
        let r = okProxies[i];
        html += `<tr>
            <td>${i+1}</td>
            <td>${r.proxy}</td>
            <td class="ok">${r.status}</td>
            <td>${r.info}</td>
        </tr>`;
    }

    document.getElementById("table").innerHTML = html;

    // ✅ Pagination avec < >
    let pageCount = Math.ceil(okProxies.length/itemsPerPage);
    let paginationHtml = "";

    // Bouton précédent
    paginationHtml += `
        <li class="page-item ${page===1?'disabled':''}">
            <a class="page-link" href="#" onclick="goToPage(${page-1})">&lt;</a>
        </li>`;

    // Pages
    for(let i=1;i<=pageCount;i++){
        paginationHtml += `
            <li class="page-item ${i===page?'active':''}">
                <a class="page-link" href="#" onclick="goToPage(${i})">${i}</a>
            </li>`;
    }

    // Bouton suivant
    paginationHtml += `
        <li class="page-item ${page===pageCount?'disabled':''}">
            <a class="page-link" href="#" onclick="goToPage(${page+1})">&gt;</a>
        </li>`;

    document.getElementById("pagination").innerHTML = paginationHtml;
}

function goToPage(page){
    let pageCount = Math.ceil(okProxies.length/itemsPerPage);
    if(page < 1 || page > pageCount) return;
    currentPage = page;
    renderTable(page);
}

// ✅ LOAD RESULT
function loadResults(){
    let interval = setInterval(async ()=>{
        let res = await fetch("/results");
        let data = await res.json();

        document.getElementById("status").innerText =
            data.running ? (data.paused ? "⏸ Paused" : "⏳ Running...") : "✅ Finished";

        okProxies = data.results.filter(r=>r.status=='OK');

        renderTable(currentPage);

        // Progress bar
        if(total>0){
            let percent = Math.floor((data.results.length/total)*100);
            let bar = document.getElementById("progressBar");
            bar.style.width = percent + "%";
            bar.innerText = percent + "%";

            if(percent >= 100 && !toastShown){
                toastShown = true;
                let toast = new bootstrap.Toast(document.getElementById('finishToast'));
                toast.show();
            }
        }

        // Counters
        let okCountEl = document.getElementById("okCount");
        let deadCountEl = document.getElementById("deadCount");
        let dead = data.results.filter(r=>r.status!=='OK').length;

        if(okCountEl.innerText != okProxies.length){
            okCountEl.innerText = okProxies.length;
            okCountEl.classList.add("pulse");
            setTimeout(()=>okCountEl.classList.remove("pulse"),500);
        }

        if(deadCountEl.innerText != dead){
            deadCountEl.innerText = dead;
            deadCountEl.classList.add("pulse");
            setTimeout(()=>deadCountEl.classList.remove("pulse"),500);
        }

        if(!data.running) clearInterval(interval);

    }, 1000);
}

function download(){
    window.location.href = "/download";
}
</script>

</body>
</html>
